<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" font-family="Inter, Arial, sans-serif">
  <defs>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0" stop-color="#4da2ff" stop-opacity="0.16" />
      <stop offset="1" stop-color="#4da2ff" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="675" fill="#0a0e16" />
  <rect width="1200" height="675" fill="url(#glow)" />

  <!-- brand lockup -->
  <g transform="translate(80,74)">
    <g fill="none" stroke="#4da2ff" stroke-width="3.4" stroke-linecap="round" stroke-linejoin="round">

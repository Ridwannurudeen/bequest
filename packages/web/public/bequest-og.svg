  <text x="80" y="392" fill="#f4f6fb" font-size="76" font-weight="800" letter-spacing="-3.2">transfers on Sui.</text>

  <!-- sub -->
  <text x="82" y="462" fill="#98a2b5" font-size="30" font-weight="500">Hand assets to anyone — released only when an</text>
  <text x="82" y="504" fill="#98a2b5" font-size="30" font-weight="500">on-chain condition is proven.</text>


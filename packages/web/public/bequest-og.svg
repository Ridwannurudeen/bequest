  </g>

  <!-- recipient card mock -->
  <g transform="translate(760,150)">
    <rect width="360" height="376" rx="22" fill="#ffffff" opacity="0.04" />
    <rect x="0.5" y="0.5" width="359" height="375" rx="21.5" fill="none" stroke="#ffffff" stroke-opacity="0.12" />
    <text x="32" y="52" fill="#6b7488" font-size="14" font-weight="700" letter-spacing="2">RECIPIENT NOTIFICATION</text>
    <rect x="262" y="32" width="66" height="30" rx="15" fill="#4da2ff" fill-opacity="0.12" stroke="#4da2ff" stroke-opacity="0.32" />
